services:
  - type: web
    name: dekker-group
    runtime: node
    buildCommand: npm install && npm install --prefix client && npm install --prefix server && npm run build --prefix client
    startCommand: node server/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        fromService:
          type: web
          name: dekker-group
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: dekker-group-db
          property: connectionString

databases:
  - name: dekker-group-db
    databaseName: dekker_group
    user: dekker
    plan: free
